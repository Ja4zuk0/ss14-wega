### VeilCult
- type: surgeryTransition
  id: VeilCultistDeconvertationTransition
  target: VeilCultistDeconvertationOperation
  label: "Извлечь латунную шестерню"
  stepGroups:
    - conditions:
        - !type:ClothingCondition
          invert: true
          slots:
          - jumpsuit
          - outerClothing
        - !type:WhitelistCondition
          whitelist:
            components:
            - VeilCultist
      steps:
        - tool: [ Drilling ]
          tag: [ Powerdrill, Pen, Pickaxe, Screwdriver ]
          action: DrillThrough
          failureEffect: [ Bleeding, Pain ]
          sound:
            path: /Audio/Items/drill_use.ogg
          time: 6
          successChance: 0.95
        - tool: [ Scalpel ]
          tag: [ Knife, Shiv, BasicGlassShard, Wirecutter ]
          action: Cut
          failureEffect: [ Cut, Bleeding ]
          sound:
            collection: Scalpel
          time: 2
          successChance: 0.95
        - tool: [ Hemostat ]
          tag: [ CableCoil, Crowbar ]
          action: ClampBleeding
          failureEffect: [ Bleeding, Pain ]
          sound:
            path: /Audio/_Wega/Medical/Surgery/hemostat1.ogg
          time: 3
          successChance: 0.95
        - tool: [ Sawing ]
          tag: [ BotanyHatchet, FireAxe ]
          action: Cut
          failureEffect: [ Cut, Bleeding, Pain ]
          sound:
            path: /Audio/_Wega/Medical/Surgery/saw.ogg
          time: 6
          successChance: 0.95

