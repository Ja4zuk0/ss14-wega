- type: surgeryTransition
  id: PerformVeilCultistDeconvertationTransition
  target: Default
  label: "Извлечь"
  stepGroups:
    - conditions:
        - !type:ClothingCondition
          invert: true
          slots:
          - jumpsuit
          - outerClothing
      parallel: true
      steps:
        - tool: [ Retractor ]
          tag: [ Crowbar ]
          action: VeilCultistDeconvertation
          failureEffect: [ Bleeding ]
          sound:
            collection: Retractor
          time: 6

- type: surgeryTransition
  id: EndVeilCultistDeconvertationTransition
  target: TorsoOpen
  label: "Завершить"
  stepGroups:
    - conditions:
        - !type:ClothingCondition
          invert: true
          slots:
          - jumpsuit
          - outerClothing
      steps:
        - tool: [ Cautery ]
          action: ClampBleeding
          failureEffect: [ Burn ]
          sound:
            collection: Cautery
          time: 2

