- type: surgeryTransition
  id: BruteHealingTransition
  target: BruteHealingOperation
  label: "Лечение механических травм"
  stepGroups:
    - conditions:
        - !type:ClothingCondition
          invert: true
          slots:
          - jumpsuit
          - outerClothing
        - !type:DamageCapCondition
          damageCount: 300
      steps:
        - tool: [ Scalpel ]
          tag: [ Knife, Shiv, BasicGlassShard, Wirecutter ]
          action: Cut
          failureEffect: [ Cut, Bleeding ]
          sound:
            collection: Scalpel
          time: 2
          successChance: 0.95
        - tool: [ Hemostat ]
          tag: [ CableCoil, Crowbar ]
          action: ClampBleeding
          failureEffect: [ Bleeding, Pain ]
          sound:
            path: /Audio/_Wega/Medical/Surgery/hemostat1.ogg
          time: 5
          successChance: 0.95
        - tool: [ Retractor ]
          tag: [ Crowbar ]
          action: Retract
          failureEffect: [ Pain ]
          sound:
            collection: Retractor
          time: 4

