- type: entity
  id: SyndicateCircuitBoard
  parent: [BaseElectronics, BaseSyndicateContraband]
  name: law board (Syndicate)
  description: An electronics board containing the Syndicate lawset.
  components:
  - type: Sprite
    sprite: Objects/Misc/module.rsi
    state: std_mod
  - type: SiliconLawProvider
    laws: SyndicateStatic
    lawUploadSound: /Audio/Ambience/Antag/emagged_borg.ogg

- type: entity
  id: ThiefimovCircuitBoard
  parent: BaseElectronics
  name: law board (Thiefimov)
  description: An electronics board containing the Thiefimov lawset.
  components:
  - type: Sprite
    sprite: Objects/Misc/module.rsi
    state: std_mod
  - type: SiliconLawProvider
    laws: thiefimov
    
- type: entity
  id: PlayerBorgSyndicateMedicalBattery
  parent: BorgChassisSyndicateMedical
  suffix: Battery, Module, Operative
  components:
  - type: NukeOperative
  - type: ContainerFill
    containers:
      borg_brain:
        - PositronicBrain
      borg_module:
        - BorgModuleOperative
        - BorgModuleSyndicateWeapon
        - BorgModuleTool
        - BorgModuleChemSyndicate
        - BorgModuleSurgerySyndicate
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMicroreactor # PowerCellHyper Corvax-Wega

- type: entity
  id: PlayerBorgSyndicateMedicalGhostRole
  parent: PlayerBorgSyndicateMedicalBattery
  suffix: Ghost role
  components:
    - type: GhostRole
      name: ghost-role-information-syndicate-cyborg-medical-name
      description: ghost-role-information-syndicate-cyborg-description
      rules: ghost-role-information-silicon-rules
      raffle:
        settings: default
      job: Borg
    - type: GhostTakeoverAvailable