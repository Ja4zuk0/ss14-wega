- type: entity
  parent: BaseItem
  id: BorgGeneratorProCandy
  suffix: 50 medical
  name: candy generator
  description: Tastes like cardboard.
  components:
  - type: UseDelay
    delay: 15
  - type: Sprite
    sprite: Objects/Devices/gates.rsi
    layers:
    - state: base
  - type: Item
    size: Tiny
  - type: SpawnItemsOnUse
    uses: 100000
    items:
      - id: FoodProduceLollipop
        orGroup: CCandyBorg
      - id: FoodProduceLollipopMedical
        prob: 0.5
        orGroup: CCandyBorg
    sound:
      path: /Audio/Machines/phasein.ogg

- type: entity
  name: handheld crew monitor
  parent: BaseHandheldComputer
  id: HandheldCrewMonitorBorg
  description: A hand-held crew monitor displaying the status of suit sensors.
  components:
  - type: Item
    heldPrefix: scanner
  - type: Sprite
    sprite: Objects/Specific/Medical/handheldcrewmonitor.rsi
    state: scanner
  - type: ActivatableUI
    key: enum.CrewMonitoringUIKey.Key
  - type: UserInterface
    interfaces:
      enum.CrewMonitoringUIKey.Key:
        type: CrewMonitoringBoundUserInterface
  - type: CrewMonitoringConsole
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: CrewMonitor
  - type: WirelessNetworkConnection
    range: 500
  - type: StationLimitedNetwork
  - type: StaticPrice
    price: 500
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMicroreactor
        disableEject: true
        swap: false

- type: entity
  parent: [BorgHypo,SolutionHyposprayTiny]
  id: BaseBorgHypoGenerated
  abstract: true
  components:
  - type: Sprite
    sprite: _Wega/Objects/Specific/Medical/hyno.rsi
    layers:
    - state: borghypo
      map: [ "enum.SolutionContainerLayers.Base" ]
    - state: borghypo_fill1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    fillBaseName: borghypo_fill
    solutionName: hypospray
  - type: Item
    sprite: _Wega/Objects/Specific/Medical/hyno.rsi
  - type: SolutionRegeneration
    generated:
      reagents:
      - ReagentId: Tricordrazine
        Quantity: 0.5
  - type: Injector
    currentTransferAmount: null
    activeModeProtoId: HyposprayInjectMode
    allowedModes:
    - HyposprayInjectMode
  - type: ChangeableReagent
    reagents:
    - generated:
        reagents:
        - ReagentId: Bicaridine
          Quantity: 0.5
      name: Water
    - generated:
        reagents:
        - ReagentId: Tricordrazine
          Quantity: 0.5
      name: Bica
  - type: Unremoveable
  - type: Tag
    tags:
    - Itemborg

- type: entity
  parent: BaseBorgHypoGenerated
  id: BorgHypoGeneratedGeneral
  components:
  - type: Solution
    solution:
      maxVol: 10
  - type: SolutionRegeneration
    generated:
      reagents:
      - ReagentId: Beer
        Quantity: 0
  - type: ChangeableReagent
    reagents:
    - reagent:
      - ReagentId: Beer
        Quantity: 0
      name: no-reagent
    - reagent:
      - ReagentId: Tricordrazine
        Quantity: 1
      name: reagent-name-tricordrazine
    - reagent:
      - ReagentId: Epinephrine
        Quantity: 1
      name: reagent-name-epinephrine

